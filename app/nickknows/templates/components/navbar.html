<script>
    (function () {
        const navLinks = document.getElementById('navLinks');
        const hamburger = document.getElementById('navHamburger');
        const dropdowns = document.querySelectorAll('[data-nk-dropdown]');

        function closeAllDropdowns() {
            dropdowns.forEach(d => {
                d.classList.remove('is-open');
                const btn = d.querySelector('[data-nk-dropdown-btn]');
                if (btn) btn.setAttribute('aria-expanded', 'false');
            });
        }

        function closeMenu() {
            navLinks.classList.remove('active');
            hamburger.classList.remove('is-active');
            hamburger.setAttribute('aria-expanded', 'false');
            closeAllDropdowns();
        }

        if (hamburger) {
            hamburger.addEventListener('click', (e) => {
                e.stopPropagation();
                const isOpen = navLinks.classList.toggle('active');
                hamburger.classList.toggle('is-active', isOpen);
                hamburger.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
                if (!isOpen) closeAllDropdowns();
            });
        }

        dropdowns.forEach(dropdown => {
            const btn = dropdown.querySelector('[data-nk-dropdown-btn]');
            if (!btn) return;
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const willOpen = !dropdown.classList.contains('is-open');
                closeAllDropdowns();
                if (willOpen) {
                    dropdown.classList.add('is-open');
                    btn.setAttribute('aria-expanded', 'true');
                }
            });
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('[data-nk-dropdown]')) {
                closeAllDropdowns();
            }
            if (navLinks.classList.contains('active')
                && !e.target.closest('#navLinks')
                && !e.target.closest('#navHamburger')) {
                closeMenu();
            }
        });

        navLinks.querySelectorAll('a').forEach(link => {
            link.addEventListener('click', () => closeMenu());
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeMenu();
        });
    })();
</script>
