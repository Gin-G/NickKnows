{{- if and .Values.hydrowBroker.enabled .Values.hydrowBroker.externalSecrets.enabled .Values.hydrowBroker.externalSecrets.createSecretStore }}
# Namespaced SecretStore pointing at the in-cluster OpenBao instance.
# Requires a Secret named `openbao-credentials` in this namespace with key
# OPENBAO_TOKEN. If you already have a ClusterSecretStore set
# hydrowBroker.externalSecrets.createSecretStore: false and reference it by
# name via hydrowBroker.externalSecrets.secretStoreName / secretStoreKind.
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: {{ .Values.hydrowBroker.externalSecrets.secretStoreName }}
  namespace: {{ .Release.Namespace }}
spec:
  provider:
    vault:
      auth:
        tokenSecretRef:
          key: OPENBAO_TOKEN
          name: openbao-credentials
      path: {{ .Values.hydrowBroker.externalSecrets.openbaoMount }}
      server: {{ .Values.hydrowBroker.externalSecrets.openbaoServer }}
      version: v2
{{- end }}
