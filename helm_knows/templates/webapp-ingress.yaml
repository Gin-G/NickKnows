{{- $hosts := prepend (default (list) .Values.webapp.fqdnAliases) .Values.webapp.fqdn -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Values.webapp.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Values.webapp.name }}
    group: {{ .Values.webapp.group }}
  annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-cloudflare"
      external-dns.alpha.kubernetes.io/target: "8.44.158.127"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
      {{- range $hosts }}
      - {{ . }}
      {{- end }}
      secretName: nickknows-prod-tls
  rules:
  {{- range $hosts }}
  - host: {{ . }}
    http:
      paths:
      - path: {{ $.Values.webapp.path }}
        pathType: Prefix
        backend:
          service:
            name: {{ $.Values.webapp.name }}
            port:
              number: {{ $.Values.webapp.container.port }}
      - path: /flower
        pathType: Prefix
        backend:
          service:
            name: {{ $.Values.webapp.name }}-flower
            port:
              number: 5555
  {{- end }}
