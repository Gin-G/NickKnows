{{- if and .Values.hydrowBroker.enabled .Values.hydrowBroker.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.hydrowBroker.hmacSecretName }}
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: {{ .Values.hydrowBroker.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.hydrowBroker.externalSecrets.secretStoreName }}
    kind: {{ .Values.hydrowBroker.externalSecrets.secretStoreKind }}
  target:
    name: {{ .Values.hydrowBroker.hmacSecretName }}
  data:
    - secretKey: hmac
      remoteRef:
        key: {{ .Values.hydrowBroker.externalSecrets.openbaoPath }}
        property: hmac
{{- end }}
